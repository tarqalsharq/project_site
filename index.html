<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشاريع | امتحان مشترك</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --primary: #1e3a8a; 
            --primary-light: #3b82f6; 
            --secondary: #2563eb;
            --accent: #f59e0b; 
            --success: #059669; 
            --danger: #dc2626; 
            --light: #ffffff;
            --dark: #1e293b;
            --text-muted: #64748b;
            --bg-color: #f8fafc; 
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html { scroll-padding-top: 90px; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-color); color: var(--dark); line-height: 1.7; padding-bottom: 40px; font-size: 16px; }

        header { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white; padding: 3rem 1rem; text-align: center; 
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.15); 
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 35px; 
            position: relative; overflow: hidden;
        }
        header::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%); pointer-events: none;
        }
        header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        header h3 { font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 500; opacity: 0.9; color: #e0f2fe; }

        .container { display: flex; flex-direction: column; padding: 0 20px; max-width: 900px; margin: 0 auto; gap: 20px; }

        #home-view { display: block; animation: fadeIn 0.5s ease-out; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px; }
        @media(min-width: 650px) { .controls-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .btn-main { 
            padding: 20px; background: white; border: 2px solid transparent; border-radius: 16px; 
            color: var(--primary); font-weight: 700; cursor: pointer; text-align: right; 
            font-size: 1.15rem; box-shadow: var(--card-shadow); transition: var(--transition); 
            display: flex; align-items: center; justify-content: flex-start; gap: 15px;
        }
        .btn-main i { font-size: 1.4rem; color: var(--primary-light); transition: var(--transition); width: 30px; text-align: center; }
        .btn-main:hover, .btn-main:active { 
            background: var(--primary-light); color: white; transform: translateY(-4px); 
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.2); border-color: var(--primary-light);
        }
        .btn-main:hover i { color: white; }
        
        .custom-test-box { background: white; padding: 25px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-shadow: var(--card-shadow); transition: var(--transition); }
        .custom-test-box:hover { border-color: #cbd5e1; }
        .custom-test-box label { font-weight: 700; margin-bottom: 12px; color: var(--primary); font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .custom-test-box input { width: 100%; padding: 14px 18px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; text-align: center; transition: var(--transition); background-color: #f8fafc; color: var(--dark); }
        .custom-test-box input:focus { outline: none; border-color: var(--secondary); background-color: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .custom-test-box button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px; }
        .custom-test-box button:hover { background: var(--primary-light); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); }

        #quiz-view { display: none; animation: fadeIn 0.5s ease-out; }
        
        .sticky-test-nav {
            position: sticky; top: 10px; z-index: 100; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8); display: flex; justify-content: space-between;
            align-items: center; padding: 8px 12px; margin-bottom: 25px; transition: var(--transition);
        }
        .mini-btn {
            border: none; padding: 10px 16px; border-radius: 12px; font-weight: 700; 
            font-size: 1rem; cursor: pointer; transition: var(--transition); 
            display: flex; align-items: center; gap: 8px;
        }
        .mini-back { background: #f1f5f9; color: var(--dark); border: 1px solid #e2e8f0; }
        .mini-back:hover { background: #e2e8f0; }
        .mini-finish { background: var(--danger); color: white; box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2); }
        .mini-finish:hover { background: #b91c1c; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(220, 38, 38, 0.3); }
        
        .mini-score { font-weight: 800; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .score-numbers {
            background: #f8fafc; padding: 4px 15px; border-radius: 20px; 
            border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 6px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .score-number { color: var(--success); font-size: 1.25rem; display: inline-block; }
        .divider { color: var(--text-muted); font-weight: normal; }

        @keyframes pulseScore {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); text-shadow: 0 0 10px var(--success); }
            100% { transform: scale(1); }
        }
        .score-bump { animation: pulseScore 0.4s ease-out; }

        .math-filters-container { display: none; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; padding: 15px; background: white; border-radius: 16px; box-shadow: var(--card-shadow); border: 1px solid #e2e8f0; }
        .math-filter-btn { padding: 10px 14px; border: 1px solid #cbd5e1; background: #f8fafc; color: var(--text-muted); border-radius: 12px; cursor: pointer; font-size: 0.95rem; flex: 1; min-width: 140px; transition: var(--transition); display: flex; align-items: center; justify-content: flex-start; gap: 12px; }
        .math-filter-btn:hover { background: #e2e8f0; color: var(--dark); }
        .math-filter-btn.active-filter { background: var(--primary-light); color: white; border-color: var(--primary-light); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .q-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--primary); color: white; min-width: 32px; height: 32px; padding: 0 8px; border-radius: 8px; font-size: 0.85rem; font-weight: 800; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .math-filter-btn.active-filter .q-badge { background: white; color: var(--primary-light); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .btn-txt { flex-grow: 1; text-align: right; font-weight: 700; }

        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 30px; box-shadow: var(--card-shadow); border: 1px solid #f1f5f9; border-right: 5px solid var(--primary-light); transition: var(--transition); }
        .question-card:hover { box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.08); transform: translateY(-2px); }
        .q-text-container { padding: 20px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 20px; font-size: 1.2rem; font-weight: 700; direction: ltr; text-align: left; color: var(--dark); display: flex; align-items: center; }
        .options-list { list-style: none; direction: ltr; margin-bottom: 20px; }
        .option-item { padding: 16px 20px; margin-bottom: 12px; background: #ffffff; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1.1rem; font-weight: 500; text-align: left; transition: var(--transition); cursor: pointer; color: #334155; position: relative; overflow: hidden; }
        .option-item:hover:not(.disabled) { border-color: var(--primary-light); background: #eff6ff; transform: translateX(-4px); }
        .option-item.correct { background: var(--success) !important; color: white; border-color: var(--success); box-shadow: 0 4px 15px rgba(5, 150, 105, 0.2); }
        .option-item.incorrect { background: var(--danger) !important; color: white; border-color: var(--danger); box-shadow: 0 4px 15px rgba(220, 38, 38, 0.2); }
        .option-item.hidden { display: none !important; }
        .option-item.disabled { cursor: not-allowed; opacity: 0.9; }

        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; border-top: 2px dashed #e2e8f0; padding-top: 20px; }
        .action-btn { flex: 1; min-width: 120px; padding: 12px 10px; border: none; border-radius: 10px; font-weight: 700; color: white; font-size: 1rem; transition: var(--transition); text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .action-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
        .action-btn:disabled { background: #cbd5e1 !important; color: #64748b; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-translate { background: #8b5cf6; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25); }
        .btn-explain { background: var(--accent); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25); }
        .btn-solve { background: var(--success); box-shadow: 0 4px 12px rgba(5, 150, 105, 0.25); }

        .solution-box { display: none; margin-top: 20px; padding: 20px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; animation: slideDown 0.3s ease-out; }
        .sol-title { color: var(--success); font-weight: 800; border-bottom: 2px solid #dcfce7; padding-bottom: 8px; margin-bottom: 12px; font-size: 1.15rem; display: flex; align-items: center; gap: 8px; }
        .sol-content-ar { direction: rtl; text-align: right; font-size: clamp(0.95rem, 3vw, 1.05rem); color: #334155; margin-bottom: 20px; line-height: 2;}
        .sol-content { direction: rtl; text-align: right; font-size: clamp(0.9rem, 3vw, 1.05rem); line-height: 2; overflow-x: auto; padding: 15px; background: white; border-radius: 10px; border: 1px solid #e2e8f0; word-wrap: break-word; } 
        .sol-content::-webkit-scrollbar { height: 6px; }
        .sol-content::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .sol-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 550px; padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); position: relative; animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalPop { 0% { transform: scale(0.95) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-header { font-size: 1.4rem; font-weight: 800; color: var(--dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .modal-body { font-size: 1.15rem; line-height: 1.9; color: #334155; text-align: right; direction: rtl; max-height: 60vh; overflow-y: auto; padding-left: 10px; }
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .modal-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-close-btn { margin-top: 25px; width: 100%; padding: 14px; background: #f1f5f9; color: var(--dark); border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .modal-close-btn:hover { background: #e2e8f0; color: var(--danger); }

        /* ---------- تصميم زر التليجرام المحدث ---------- */
        .telegram-container { margin-bottom: 25px; }
        .btn-telegram { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%); 
            color: white; 
            padding: 16px 20px; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 800; 
            
            /* الخط يتغير حجمه بمرونة حسب حجم الشاشة لمنع التكسر */
            font-size: clamp(0.95rem, 4vw, 1.2rem); 
            
            /* هذه الخاصية السحرية تمنع النص من النزول لسطر جديد */
            white-space: nowrap; 
            
            box-shadow: 0 8px 20px rgba(42, 171, 238, 0.3); 
            transition: var(--transition); 
            width: 100%; 
            position: relative; 
            overflow: hidden; 
        }
        .btn-telegram::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        .btn-telegram:hover, .btn-telegram:active { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(42, 171, 238, 0.4); color: white; }
        .btn-telegram i { font-size: 1.5rem; }
        /* ----------------------------------------------- */

        /* تحسينات الموبايل العامة */
        @media (max-width: 550px) {
            .hide-mobile { display: none; }
            .mini-btn { padding: 10px 14px; }
            .sticky-test-nav { padding: 8px; border-radius: 14px; top: 5px; }
            
            /* تقليل المسافات في زر التليجرام على الشاشات الصغيرة جداً */
            .btn-telegram {
                padding: 14px;
                gap: 8px;
            }
            .btn-telegram i { font-size: 1.3rem; }
        }

        footer { margin-top: 50px; text-align: center; color: var(--text-muted); font-size: 0.95rem; border-top: 2px dashed #e2e8f0; padding-top: 30px; }
        .designer-name { font-weight: 800; color: var(--primary); font-size: 1.15rem; margin-top: 10px; display: inline-block; background: #f1f5f9; padding: 15px 25px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .contact-info-hidden { display: none; }
        
        .MathJax { font-size: 1.1em !important; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; height: 0; } to { opacity: 1; height: auto; } }

    </style>
</head>
<body>

    <header>
        <h1>إدارة المشاريع</h1>
        <h3>امتحان مشترك - الفصل الثاني</h3>
    </header>

    <div class="container">
        <div id="home-view">
            <div class="controls-grid">
                <button class="btn-main" onclick="loadSection('bank')">
                    <i class="fa-solid fa-layer-group"></i> بنك الأسئلة (كامل)
                </button>
                <button class="btn-main" onclick="loadSection('bank-math')">
                    <i class="fa-solid fa-calculator"></i> بنك المسائل الحسابية
                </button>
                <button class="btn-main" onclick="loadSection('test', 125)">
                    <i class="fa-solid fa-file-signature"></i> اختبار شامل (125 سؤال)
                </button>
                <button class="btn-main" onclick="loadSection('test-theory')">
                    <i class="fa-solid fa-book-open-reader"></i> اختبار الأسئلة الشرحية
                </button>
            </div>
            
            <div class="telegram-container">
                <a href="https://t.me/dx3ee" target="_blank" class="btn-telegram">
                    <i class="fa-brands fa-telegram"></i> انضم لكروب القناة على تيليجرام
                </a>
            </div>

            <div class="custom-test-box">
                <label><i class="fa-solid fa-dice"></i> اختبار عشوائي (حدد العدد):</label>
                <input type="number" id="random-num" placeholder="مثلاً: 25">
                <button onclick="startCustomRandom()">
                    <i class="fa-solid fa-play"></i> ابدأ الاختبار العشوائي
                </button>
            </div>

            <div class="custom-test-box">
                <label><i class="fa-solid fa-list-ol"></i> اختبار نطاق محدد (من - إلى):</label>
                <div style="display: flex; gap: 15px;">
                    <input type="number" id="range-start" placeholder="من (مثال: 1)">
                    <input type="number" id="range-end" placeholder="إلى (مثال: 20)">
                </div>
                <button onclick="startCustomRange()" style="margin-top: 15px;">
                    <i class="fa-solid fa-play"></i> ابدأ اختبار النطاق
                </button>
            </div>
            
            <footer>
                <p>تصميم وتطوير برمجيات المنصة:</p>
                <p class="designer-name" style="line-height: 1.9;">
                    طارق احمد سعيد<br>
                    ابراهيم محمود حسين<br>
                    علي حمد صالح
                </p>
                
                <div class="contact-info-hidden">
                    <p>Telegram: t.me/nigacosmetic</p>
                    <p>Phone: 07700322891</p>
                </div>
            </footer>
        </div>

        <div id="quiz-view">
            
            <div id="sticky-test-nav" class="sticky-test-nav">
                <button class="mini-btn mini-back" onclick="goHome()">
                    <i class="fa-solid fa-chevron-right"></i> <span class="hide-mobile">رجوع</span>
                </button>
                
                <div id="score-tracker" class="mini-score">
                    <span class="hide-mobile" style="color: var(--text-muted); font-size: 0.95rem;">النتيجة: </span>
                    <div class="score-numbers">
                        <span id="correct-score" class="score-number">0</span>
                        <span class="divider">/</span>
                        <span id="answered-score">0</span>
                    </div>
                </div>

                <button id="btn-finish-test" class="mini-btn mini-finish" onclick="finishTest()">
                    <span class="hide-mobile">إنهاء</span> <i class="fa-solid fa-flag-checkered"></i>
                </button>
            </div>
            
            <div id="math-filters" class="math-filters-container">
                <button class="math-filter-btn active-filter" onclick="filterMathCategory('All')">الكل</button>
                <button class="math-filter-btn" onclick="filterMathCategory('BEP')">نقطة التعادل (BEP)</button>
                <button class="math-filter-btn" onclick="filterMathCategory('EOQ')">المخزون (EOQ)</button>
                <button class="math-filter-btn" onclick="filterMathCategory('LP')">البرمجة الخطية (LP)</button>
                <button class="math-filter-btn" onclick="filterMathCategory('Maintenance')">الصيانة (Maintenance)</button>
                <button class="math-filter-btn" onclick="filterMathCategory('Machine')">مقارنة المكائن (Machine)</button>
            </div>

            <div id="questions-container"></div>
        </div>
    </div>

    <div id="explain-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"></div> 
            <div id="modal-text" class="modal-body"></div>
            <button class="modal-close-btn" onclick="closeModal()">
                <i class="fa-solid fa-xmark"></i> إغلاق
            </button>
        </div>
    </div>

    <script>
        
        const questionsData = [
            // --- الدفعة الأولى (من 1 إلى 15) ---
            {
                id: 1,
                text: "The cost that varies directly with the level of output or production called:",
                textAr: "التكلفة التي تتغير بشكل مباشر مع مستوى المخرجات أو الإنتاج تسمى:",
                options: ["A- Fixed costs", "B- Variable costs", "C- Mixed costs", "D- All above"],
                optionsAr: ["أ- التكاليف الثابتة", "ب- التكاليف المتغيرة", "ج- التكاليف المختلطة", "د- جميع ما سبق"],
                correctIndex: 1, type: "theory", category: "Theory",
                explanation: "التكاليف التي تزيد وتنقص بناءً على كمية الإنتاج هي (التكاليف المتغيرة - Variable costs). أما التكاليف الثابتة فلا تتأثر بحجم الإنتاج."
            },
            {
                id: 2,
                text: "The maintenance that takes place periodically is:",
                textAr: "الصيانة التي يتم إجراؤها بشكل دوري (منتظم) تسمى:",
                options: ["A- Predictive maintenance", "B- Preventive maintenance", "C- Break down maintenance", "D- None of above"],
                optionsAr: ["أ- الصيانة التنبؤية", "ب- الصيانة الوقائية", "ج- صيانة الأعطال", "د- لا شيء مما سبق"],
                correctIndex: 1, type: "theory", category: "Theory",
                explanation: "الصيانة التي تتم في مواعيد مجدولة مسبقاً لمنع حدوث العطل هي (الصيانة الوقائية - Preventive maintenance)."
            },
            {
                id: 3,
                text: "The major objective in controlling inventory is to:",
                textAr: "الهدف الرئيسي من السيطرة على المخزون هو:",
                options: ["A- Maximize total inventory costs", "B- Neutralize total inventory cost", "C- Minimize total inventory cost", "D- All of the above"],

        let currentViewData = [];
        let isTestMode = false;
        let scoreCorrect = 0;
        let scoreAnswered = 0;

        function updateScoreBoard() {
            const correctSpan = document.getElementById('correct-score');
            
            if(scoreCorrect > parseInt(correctSpan.innerText || 0)) {
                correctSpan.classList.remove('score-bump');
                void correctSpan.offsetWidth; 
                correctSpan.classList.add('score-bump');
            }
            
            correctSpan.innerText = scoreCorrect;
            document.getElementById('answered-score').innerText = scoreAnswered;
        }

        function goHome() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        function finishTest() {
            if(scoreAnswered === 0) {
                alert("لم تقم بالإجابة على أي سؤال بعد!");
                return;
            }
            let percentage = Math.round((scoreCorrect / scoreAnswered) * 100);
            let msg = `إحصائيات الاختبار:\n\n` +
                      `عدد الأسئلة المجاب عليها: ${scoreAnswered}\n` +
                      `الإجابات الصحيحة: ${scoreCorrect}\n` +
                      `النسبة المئوية: ${percentage}%\n\n`;
            
            if(percentage >= 90) msg += "ممتاز جداً! أنت مستعد للامتحان 🥇";
            else if(percentage >= 70) msg += "جيد جداً! راجع أخطائك لتصبح أفضل 🥈";
            else msg += "تحتاج إلى المزيد من التركيز والمراجعة 📚";

            alert(msg);
        }

        let mainMathData = []; 

        function loadSection(mode, param) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';

            isTestMode = mode.startsWith('test');
            
            document.getElementById('score-tracker').style.display = isTestMode ? 'flex' : 'none';
            document.getElementById('btn-finish-test').style.display = isTestMode ? 'flex' : 'none';
            
            if(mode === 'bank-math') {
                document.getElementById('math-filters').style.display = 'flex';
            } else {
                document.getElementById('math-filters').style.display = 'none';
            }
            
            scoreCorrect = 0; scoreAnswered = 0; updateScoreBoard();
            let filteredData = [...questionsData];

            if (mode === 'test') {
                filteredData = filteredData.sort(() => 0.5 - Math.random()).slice(0, param);
            } else if (mode === 'test-theory') {
                filteredData = filteredData.filter(q => q.type === 'theory').sort(() => 0.5 - Math.random());
            } else if (mode === 'bank-math') {
                filteredData = filteredData.filter(q => q.type === 'math');
                mainMathData = [...filteredData]; 
            }

            currentViewData = filteredData;
            renderQuestions(mode);
            window.scrollTo(0, 0);
            
            if(mode === 'bank-math') {
                document.querySelectorAll('.math-filter-btn').forEach(b => b.classList.remove('active-filter'));
                document.querySelector('.math-filter-btn').classList.add('active-filter');
            }
        }

        function filterMathCategory(cat) {
            document.querySelectorAll('.math-filter-btn').forEach(btn => btn.classList.remove('active-filter'));
            event.target.classList.add('active-filter');

            if(cat === 'All') {
                currentViewData = [...mainMathData];
            } else {
                currentViewData = mainMathData.filter(q => q.category === cat);
            }
            renderQuestions('bank-math');
        }

        function startCustomRandom() {
            let num = document.getElementById('random-num').value;
            if(!num || num < 1) return alert('يرجى إدخال رقم صحيح');
            loadSection('test', parseInt(num));
        }

        function startCustomRange() {
            let start = parseInt(document.getElementById('range-start').value);
            let end = parseInt(document.getElementById('range-end').value);
            if(!start || !end || start > end) return alert('يرجى إدخال نطاق صحيح');
            
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('math-filters').style.display = 'none';
            isTestMode = true;
            document.getElementById('score-tracker').style.display = 'flex';
            document.getElementById('btn-finish-test').style.display = 'flex';
            
            scoreCorrect = 0; scoreAnswered = 0; updateScoreBoard();
            currentViewData = questionsData.filter(q => q.id >= start && q.id <= end);
            renderQuestions('test');
            window.scrollTo(0, 0);
        }

        function renderQuestions(mode) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            if(currentViewData.length === 0) {
                container.innerHTML = '<h3 style="text-align:center; padding: 40px; color: #64748b;">لا توجد أسئلة في هذا النطاق حالياً.</h3>';
                return;
            }

            if(mode === 'bank-math' || isTestMode === true) {
                currentViewData.sort((a, b) => a.id - b.id);
            }

            currentViewData.forEach(q => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${q.id}`;

                let optionsHTML = '';
                q.options.forEach((opt, optIdx) => {
                    let extraClass = (!isTestMode && optIdx === q.correctIndex) ? 'correct disabled' : '';
                    let clickEvent = isTestMode ? `onclick="handleAnswer(${q.id}, ${optIdx}, ${q.correctIndex})"` : 'class="disabled"';
                    optionsHTML += `<li class="option-item ${extraClass}" id="opt-${q.id}-${optIdx}" ${clickEvent}>${opt}</li>`;
                });

                let disableLogic = isTestMode ? 'disabled' : '';
                let solveBtn = q.type === 'math' ? `<button class="action-btn btn-solve" id="btn-solve-${q.id}" onclick="toggleSolution(${q.id})" ${disableLogic}><i class="fa-solid fa-pen-ruler"></i> إظهار الحل</button>` : '';

                card.innerHTML = `
                    <div class="q-text-container" id="q-container-${q.id}">
                        <div id="q-text-${q.id}">Q${q.id}: ${q.text}</div>
                    </div>
                    <ul class="options-list" id="options-list-${q.id}">
                        ${optionsHTML}
                    </ul>
                    <div class="action-buttons">
                        <button class="action-btn btn-translate" id="btn-trans-${q.id}"><i class="fa-solid fa-language"></i> الترجمة</button>
                        <button class="action-btn btn-explain" id="btn-explain-${q.id}" onclick="openExplainModal(${q.id})" ${disableLogic}><i class="fa-solid fa-lightbulb"></i> الشرح</button>
                        ${solveBtn}
                    </div>
                    
                    <div class="solution-box" id="sol-box-${q.id}">
                        <div class="sol-title"><i class="fa-solid fa-clipboard-list"></i> المعطيات والمطلوب</div>
                        <div class="sol-content-ar"><b>المعطيات:</b> <span dir="ltr">${q.givens || ''}</span><br><b>المطلوب:</b> ${q.required || ''}</div>
                        <div class="sol-title"><i class="fa-solid fa-stairs"></i> خطوات الحل</div>
                        <div class="sol-content">${q.steps || ''}</div>
                    </div>
                `;
                container.appendChild(card);

                setupTranslationEvents(q);
            });

            if(window.MathJax) MathJax.typesetPromise();
        }

        function openExplainModal(id) {
            const q = currentViewData.find(x => x.id === id);
            document.querySelector('#explain-modal .modal-header').innerHTML = '<i class="fa-solid fa-lightbulb" style="color: var(--accent);"></i> شرح السؤال';
            document.getElementById('modal-text').innerHTML = q.explanation;
            document.getElementById('explain-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('explain-modal').style.display = 'none';
        }

        function setupTranslationEvents(q) {
            const btn = document.getElementById(`btn-trans-${q.id}`);
            
            btn.onclick = (e) => {
                if (e.cancelable) e.preventDefault();
                
                const modalHeader = document.querySelector('#explain-modal .modal-header');
                const modalText = document.getElementById('modal-text');
                
                modalHeader.innerHTML = '<i class="fa-solid fa-language" style="color: #8b5cf6;"></i> ترجمة السؤال والخيارات';
                
                let transHtml = `<strong>السؤال:</strong><br>${q.textAr}<br><br><strong>الخيارات:</strong><br><ul style="list-style:none; padding:0;">`;
                q.optionsAr.forEach(opt => {
                    transHtml += `<li style="margin-bottom:10px; padding:15px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; font-weight:500;">${opt}</li>`;
                });
                transHtml += `</ul>`;
                
                modalText.innerHTML = transHtml;
                document.getElementById('explain-modal').style.display = 'flex';
            };
        }

        function toggleSolution(id) {
            const solBox = document.getElementById(`sol-box-${id}`);
            const btn = document.getElementById(`btn-solve-${id}`);
            const q = currentViewData.find(x => x.id === id);
            const options = document.querySelectorAll(`#options-list-${id} .option-item`);

            if (solBox.style.display === 'block') {
                solBox.style.display = 'none';
                btn.innerHTML = '<i class="fa-solid fa-pen-ruler"></i> إظهار الحل';
                btn.style.backgroundColor = 'var(--success)';
            } else {
                solBox.style.display = 'block';
                btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i> إخفاء الحل';
                btn.style.backgroundColor = '#64748b'; 
                
                options.forEach((opt, idx) => {
                    if(idx !== q.correctIndex) opt.classList.add('hidden');
                });

                if(window.MathJax) MathJax.typesetPromise();
            }
        }

        function handleAnswer(qId, selectedIdx, correctIdx) {
            const card = document.getElementById(`q-card-${qId}`);
            const options = card.querySelectorAll('.option-item');
            
            if(options[0].classList.contains('disabled')) return;

            scoreAnswered++;
            let isCorrect = (selectedIdx === correctIdx);
            if(isCorrect) scoreCorrect++;
            updateScoreBoard();

            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === correctIdx) {
                    opt.classList.add('correct');
                } else if (idx === selectedIdx && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });

            document.getElementById(`btn-explain-${qId}`).disabled = false;
            let solveBtn = document.getElementById(`btn-solve-${qId}`);
            if(solveBtn) solveBtn.disabled = false;
        }
        
        function showCategoryCounts() {
            if(typeof questionsData === 'undefined' || questionsData.length === 0) return;

            const mathQs = questionsData.filter(q => q.type === 'math');
            const counts = {
                'All': mathQs.length,
                'BEP': mathQs.filter(q => q.category === 'BEP').length,
                'EOQ': mathQs.filter(q => q.category === 'EOQ').length,
                'LP': mathQs.filter(q => q.category === 'LP').length,
                'Maintenance': mathQs.filter(q => q.category === 'Maintenance').length,
                'Machine': mathQs.filter(q => q.category === 'Machine').length
            };

            document.querySelectorAll('.math-filter-btn').forEach(btn => {
                if(btn.querySelector('.q-badge')) return; 

                const match = btn.getAttribute('onclick').match(/'([^']+)'/);
                if (match) {
                    const cat = match[1];
                    if (counts[cat] !== undefined) {
                        const originalText = btn.innerHTML;
                        btn.innerHTML = `<span class="q-badge">${counts[cat]}</span> <span class="btn-txt">${originalText}</span>`;
                    }
                }
            });
        }
        
        setTimeout(showCategoryCounts, 500); 

    </script>
</body>
</html>
